AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: 문진톡톡 MVP v2 - Option B 양면 흐름 + 87 슬롯 + 위험 분기

Parameters:
  AudioBucketName:
    Type: String
    Default: munjin-tok-tok-audio-temp
    Description: 음성 임시 저장 버킷 (1일 TTL)
  SessionsTableName:
    Type: String
    Default: munjin-sessions
    Description: 세션 데이터 저장 테이블
  BedrockModelId:
    Type: String
    Default: anthropic.claude-3-5-haiku-20241022-v1:0
  EmbedModelId:
    Type: String
    Default: amazon.titan-embed-text-v2:0
  CustomVocabName:
    Type: String
    Default: ''
    Description: 강원 사투리 Custom Vocabulary 이름 (사전 등록 필요, 선택)
  ApiStageName:
    Type: String
    Default: dev

# ─────────────────────────────────
# 전역 Lambda 설정
# ─────────────────────────────────
Globals:
  Function:
    Runtime: python3.12
    Timeout: 30
    MemorySize: 512
    Environment:
      Variables:
        SESSIONS_TABLE: !Ref SessionsTableName
        AUDIO_BUCKET: !Ref AudioBucketName
        CLAUDE_MODEL_ID: !Ref BedrockModelId
        TITAN_MODEL_ID: !Ref EmbedModelId
        CUSTOM_VOCABULARY: !Ref CustomVocabName

# ─────────────────────────────────
# 리소스
# ─────────────────────────────────
Resources:

  # ─── API Gateway HTTP API ───
  MunjinHttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: !Ref ApiStageName
      CorsConfiguration:
        AllowOrigins: ['*']
        AllowMethods: ['GET', 'POST', 'OPTIONS']
        AllowHeaders: ['Content-Type', 'Authorization']

  # ─── S3 음성 버킷 (1일 TTL) ───
  AudioBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref AudioBucketName
      LifecycleConfiguration:
        Rules:
          - Id: ExpireAudio
            Status: Enabled
            ExpirationInDays: 1
            Prefix: sessions/
      CorsConfiguration:
        CorsRules:
          - AllowedOrigins: ['*']
            AllowedMethods: [PUT, GET]
            AllowedHeaders: ['*']
            MaxAge: 3000

  # ─── DynamoDB sessions 테이블 ───
  SessionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref SessionsTableName
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: session_id
          AttributeType: S
      KeySchema:
        - AttributeName: session_id
          KeyType: HASH

  # ════════════════════════════════
  # Phase A Lambda 함수
  # ════════════════════════════════

  # ─── upload_url ───
  UploadUrlFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../lambdas/upload_url/
      Handler: handler.handler
      Policies:
        - S3WritePolicy: {BucketName: !Ref AudioBucketName}
        - DynamoDBCrudPolicy: {TableName: !Ref SessionsTableName}
      Events:
        Post:
          Type: HttpApi
          Properties:
            ApiId: !Ref MunjinHttpApi
            Path: /upload-url
            Method: post

  # ─── transcribe_start (S3 이벤트) ───
  TranscribeStartFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../lambdas/transcribe_start/
      Handler: handler.handler
      Policies:
        - S3ReadPolicy: {BucketName: !Ref AudioBucketName}
        - S3WritePolicy: {BucketName: !Ref AudioBucketName}
        - Statement:
            Effect: Allow
            Action: ['transcribe:StartTranscriptionJob', 'transcribe:GetTranscriptionJob']
            Resource: '*'
      Events:
        S3Audio:
          Type: S3
          Properties:
            Bucket: !Ref AudioBucket
            Events: s3:ObjectCreated:*
            Filter:
              S3Key:
                Rules:
                  - Name: prefix
                    Value: sessions/
                  - Name: suffix
                    Value: .webm

  # ─── extract_spans ───
  ExtractSpansFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../lambdas/extract_spans/
      Handler: handler.handler
      Timeout: 30
      Policies:
        - Statement:
            Effect: Allow
            Action: ['bedrock:InvokeModel']
            Resource: '*'
      Events:
        Post:
          Type: HttpApi
          Properties:
            ApiId: !Ref MunjinHttpApi
            Path: /extract
            Method: post

  # ─── match_slots ───
  MatchSlotsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../lambdas/match_slots/
      Handler: handler.handler
      Timeout: 60   # 콜드 스타트 시 87 슬롯 임베딩
      MemorySize: 1024
      Policies:
        - Statement:
            Effect: Allow
            Action: ['bedrock:InvokeModel']
            Resource: '*'
      Events:
        Post:
          Type: HttpApi
          Properties:
            ApiId: !Ref MunjinHttpApi
            Path: /match
            Method: post

  # ─── validate_output ───
  ValidateOutputFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../lambdas/validate_output/
      Handler: handler.handler
      Policies:
        - DynamoDBCrudPolicy: {TableName: !Ref SessionsTableName}
      Events:
        Post:
          Type: HttpApi
          Properties:
            ApiId: !Ref MunjinHttpApi
            Path: /validate
            Method: post

  # ════════════════════════════════
  # Phase B Lambda 함수
  # ════════════════════════════════

  # ─── doctor_response (Phase B 핵심) ───
  DoctorResponseFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../lambdas/doctor_response/
      Handler: handler.handler
      Timeout: 60   # LLM 호출 (질문 수에 따라 가변)
      Policies:
        - DynamoDBCrudPolicy: {TableName: !Ref SessionsTableName}
        - Statement:
            Effect: Allow
            Action: ['bedrock:InvokeModel']
            Resource: '*'
      Events:
        Post:
          Type: HttpApi
          Properties:
            ApiId: !Ref MunjinHttpApi
            Path: /doctor-response
            Method: post

  # ─── patient_guide (조회 API 통합) ───
  PatientGuideFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../lambdas/patient_guide/
      Handler: handler.handler
      Policies:
        - DynamoDBCrudPolicy: {TableName: !Ref SessionsTableName}
      Events:
        OnePagerGet:
          Type: HttpApi
          Properties:
            ApiId: !Ref MunjinHttpApi
            Path: /onepager/{session_id}
            Method: get
        GuideGet:
          Type: HttpApi
          Properties:
            ApiId: !Ref MunjinHttpApi
            Path: /guide/{session_id}
            Method: get

# ─────────────────────────────────
# 출력
# ─────────────────────────────────
Outputs:
  ApiEndpoint:
    Description: API Gateway HTTP API endpoint
    Value: !Sub 'https://${MunjinHttpApi}.execute-api.${AWS::Region}.amazonaws.com/${ApiStageName}'
  AudioBucketArn:
    Value: !GetAtt AudioBucket.Arn
  SessionsTableArn:
    Value: !GetAtt SessionsTable.Arn
